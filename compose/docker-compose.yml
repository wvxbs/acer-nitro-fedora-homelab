name: nitro-homelab

services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    profiles: ["media"]
    network_mode: host
    restart: unless-stopped
    environment:
      PUID: "${PUID}"
      PGID: "${PGID}"
      TZ: "${TZ}"
      VERSION: docker
      PLEX_CLAIM: "${PLEX_CLAIM}"
      ADVERTISE_IP: "${PLEX_ADVERTISE_IP}"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
    volumes:
      - "${APPDATA_DIR}/plex:/config"
      - "${MEDIA_DIR}:/media"
      - "${TRANSCODE_DIR}:/transcode"
    devices:
      - /dev/dri:/dev/dri
    gpus: all

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    profiles: ["ops"]
    restart: unless-stopped
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - "${APPDATA_DIR}/portainer:/data"

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    profiles: ["ops"]
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles: ["ai"]
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - "${OLLAMA_MODELS_DIR}:/root/.ollama"
    gpus: all

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    profiles: ["ai"]
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "3000:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_AUTH: "true"
    volumes:
      - "${APPDATA_DIR}/open-webui:/app/backend/data"

  adguard-home:
    image: adguard/adguardhome:latest
    container_name: adguard-home
    profiles: ["dns"]
    restart: unless-stopped
    ports:
      - "${DNS_BIND_IP:-0.0.0.0}:53:53/tcp"
      - "${DNS_BIND_IP:-0.0.0.0}:53:53/udp"
      - "${DNS_ADMIN_PORT:-3000}:3000/tcp"
    volumes:
      - "${APPDATA_DIR}/adguard/work:/opt/adguardhome/work"
      - "${APPDATA_DIR}/adguard/conf:/opt/adguardhome/conf"

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    profiles: ["proxy"]
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - "${APPDATA_DIR}/caddy/data:/data"
      - "${APPDATA_DIR}/caddy/config:/config"
