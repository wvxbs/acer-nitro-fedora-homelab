name: nitro-homelab

services:
  rclone-jellyfin:
    image: "${RCLONE_JELLYFIN_IMAGE:-wvxbs/rclone-jellyfin:latest}"
    container_name: rclone-jellyfin
    profiles: ["media"]
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse:/dev/fuse
    security_opt:
      - apparmor:unconfined
      - label:disable
    environment:
      RCLONE_REMOTE_NAME: "${RCLONE_REMOTE_NAME:-onedrive}"
      ONEDRIVE_PATH: "${ONEDRIVE_PATH}"
      RCLONE_MOUNT_PATH: /media/onedrive
      RCLONE_CONFIG: /config/rclone.conf
      RCLONE_CACHE_DIR: /cache
      RCLONE_VFS_CACHE_MAX_SIZE: "${RCLONE_VFS_CACHE_MAX_SIZE:-40G}"
      RCLONE_VFS_CACHE_MAX_AGE: "${RCLONE_VFS_CACHE_MAX_AGE:-12h}"
      RCLONE_VFS_CACHE_MIN_FREE_SPACE: "${RCLONE_VFS_CACHE_MIN_FREE_SPACE:-30G}"
      RCLONE_BUFFER_SIZE: "${RCLONE_BUFFER_SIZE:-64M}"
      RCLONE_LOG_LEVEL: "${RCLONE_LOG_LEVEL:-INFO}"
    volumes:
      - "${RCLONE_CONFIG_PATH}:/config/rclone.conf:ro"
      - "${ONEDRIVE_MOUNT_PATH}:/media/onedrive:rshared"
      - "${RCLONE_CACHE_DIR}:/cache"

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    profiles: ["media"]
    network_mode: host
    restart: unless-stopped
    depends_on:
      - rclone-jellyfin
    environment:
      JELLYFIN_PublishedServerUrl: "http://jellyfin.nitro.lan"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
    volumes:
      - "${APPDATA_DIR}/jellyfin/config:/config"
      - "${APPDATA_DIR}/jellyfin/cache:/cache"
      - "${APPDATA_DIR}/jellyfin-media/movies-clean:/media/movies-clean:ro"
      - "${MEDIA_DIR}:/media:ro,rslave"
    devices:
      - /dev/dri:/dev/dri
    gpus: all

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    profiles: ["ops"]
    restart: unless-stopped
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - "${APPDATA_DIR}/portainer:/data"

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    profiles: ["ops"]
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    profiles: ["ops"]
    restart: unless-stopped
    pid: host
    ports:
      - "61208:61208"
    environment:
      GLANCES_OPT: "-w --disable-plugin gpu"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/os-release:/etc/os-release:ro

