name: nitro-homelab

services:
  rclone-jellyfin:
    image: "${RCLONE_JELLYFIN_IMAGE:-wvxbs/rclone-jellyfin:latest}"
    container_name: rclone-jellyfin
    profiles: ["media"]
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse:/dev/fuse
    security_opt:
      - apparmor:unconfined
      - label:disable
    environment:
      RCLONE_REMOTE_NAME: "${RCLONE_REMOTE_NAME:-onedrive}"
      ONEDRIVE_PATH: "${ONEDRIVE_PATH}"
      RCLONE_MOUNT_PATH: /media/onedrive
      RCLONE_CONFIG: /config/rclone.conf
      RCLONE_CACHE_DIR: /cache
      RCLONE_VFS_CACHE_MAX_SIZE: "${RCLONE_VFS_CACHE_MAX_SIZE:-40G}"
      RCLONE_VFS_CACHE_MAX_AGE: "${RCLONE_VFS_CACHE_MAX_AGE:-12h}"
      RCLONE_VFS_CACHE_MIN_FREE_SPACE: "${RCLONE_VFS_CACHE_MIN_FREE_SPACE:-30G}"
      RCLONE_BUFFER_SIZE: "${RCLONE_BUFFER_SIZE:-64M}"
      RCLONE_LOG_LEVEL: "${RCLONE_LOG_LEVEL:-INFO}"
    volumes:
      - "${RCLONE_CONFIG_PATH}:/config/rclone.conf:ro"
      - "${ONEDRIVE_MOUNT_PATH}:/media/onedrive:rshared"
      - "${RCLONE_CACHE_DIR}:/cache"

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    profiles: ["media"]
    network_mode: host
    restart: unless-stopped
    depends_on:
      - rclone-jellyfin
    environment:
      JELLYFIN_PublishedServerUrl: "https://jellyfin.nitro.lan"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
    volumes:
      - "${APPDATA_DIR}/jellyfin/config:/config"
      - "${APPDATA_DIR}/jellyfin/cache:/cache"
      - "${MEDIA_DIR}:/media:ro,rslave"
    devices:
      - /dev/dri:/dev/dri
    gpus: all

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    profiles: ["ops"]
    restart: unless-stopped
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - "${APPDATA_DIR}/portainer:/data"

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    profiles: ["ops"]
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    profiles: ["ops"]
    restart: unless-stopped
    pid: host
    ports:
      - "61208:61208"
    environment:
      GLANCES_OPT: "-w"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/os-release:/etc/os-release:ro
    gpus: all

  nvidia-web:
    image: python:3.12-slim
    container_name: nvidia-web
    profiles: ["ops"]
    restart: unless-stopped
    ports:
      - "9836:9836"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ./monitoring/nvidia-web.py:/app/nvidia-web.py:ro
    command: python /app/nvidia-web.py
    gpus: all

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles: ["ai"]
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_KEEP_ALIVE: "10m"
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
    volumes:
      - "${OLLAMA_MODELS_DIR}:/root/.ollama"
    gpus: all

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    profiles: ["ai"]
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "3000:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_AUTH: "true"
    volumes:
      - "${APPDATA_DIR}/open-webui:/app/backend/data"

  adguard-home:
    image: adguard/adguardhome:latest
    container_name: adguard-home
    profiles: ["dns"]
    restart: unless-stopped
    ports:
      - "${DNS_BIND_IP:-0.0.0.0}:53:53/tcp"
      - "${DNS_BIND_IP:-0.0.0.0}:53:53/udp"
      - "${DNS_ADMIN_PORT:-3000}:3000/tcp"
    volumes:
      - "${APPDATA_DIR}/adguard/work:/opt/adguardhome/work"
      - "${APPDATA_DIR}/adguard/conf:/opt/adguardhome/conf"

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    profiles: ["proxy"]
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./dashboard:/srv/dashboard:ro
      - "${APPDATA_DIR}/caddy/data:/data"
      - "${APPDATA_DIR}/caddy/config:/config"
